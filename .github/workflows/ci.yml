# Tier 1: build and run unit + integration tests on every push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Unit tests
        run: make unit-tests

      - name: Integration tests
        run: make integration-tests

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc

      - name: Build and test
        run: make all unit-tests integration-tests
        shell: msys2 {0}

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test with ASan
        run: make asan

      - name: Build and test with UBSan
        run: make ubsan

  leak-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Leak check (LeakSanitizer)
        run: make leak-check-lsan
